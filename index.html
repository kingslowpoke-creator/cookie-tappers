    <script>
        // --- Variables ---
        let cookieCount = 0;
        let totalCookies = 0;
        let cookiesPerClick = 1;
        let upgradeCost = 15;
        let grandmaCost = 100;
        let farmCost = 1100;
        let mineCost = 12000;
        let factoryCost = 130000;
        let bankCost = 1400000;
        let templeCost = 20000000;
        let wizardCost = 330000000;
        let cookiesPerSecond = 0;
        let cursorCps = 0.1;
        let grandmaCps = 1;
        let farmCps = 8;
        let mineCps = 47;
        let factoryCps = 260;
        let bankCps = 1400;
        let templeCps = 7800;
        let wizardCps = 44000;
        let lastClickTime = 0;
        let intervalId = null;
        let maxUpgradeReached = false;

        let ownedCursors = 0;
        let ownedGrandmas = 0;
        let ownedFarms = 0;
        let ownedMines = 0;
        let ownedFactories = 0;
        let ownedBanks = 0;
        let ownedTemples = 0;
        let ownedWizards = 0;

        const suffixes = ["k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Udc", "Ddc", "Tdc", "Qadc"];

        const loadingScreen = document.querySelector('.loading-screen');
        const container = document.querySelector('.container');
        const usernameContainer = document.querySelector('.username-container');
        const cookieCountElement = document.getElementById('cookie-count');
        const perSecondElement = document.getElementById('per-second');
        const cookieElement = document.getElementById('cookie');
        const upgradeButtonElement = document.getElementById('upgrade-button');
        const grandmaButtonElement = document.getElementById('grandma-button');
        const farmButtonElement = document.getElementById('farm-button');
        const mineButtonElement = document.getElementById('mine-button');
        const factoryButtonElement = document.getElementById('factory-button');
        const bankButtonElement = document.getElementById('bank-button');
        const templeButtonElement = document.getElementById('temple-button');
        const wizardButtonElement = document.getElementById('wizard-button');
        const clickSoundElement = document.getElementById('click-sound');
        const upgradeSoundElement = document.getElementById('upgrade-sound');
        const userInfoElement = document.querySelector('.user-info');
        const usernameDisplayElement = document.getElementById('username-display');
        const continueButton = document.getElementById('continue-button');
        const buildingsButton = document.getElementById('buildings-button');
        const statsButton = document.getElementById('stats-button');
        const upgradeContainer = document.getElementById('upgrade-container');
        const statsContainer = document.getElementById('stats-container');
        const totalCookiesRow = document.getElementById('total-cookies-row');

        // ---- Number Formatters ----
        function formatNumber(number) {
            if (number >= 1000000) {
                const tier = Math.floor(Math.log10(number) / 3);
                const suffix = suffixes[tier - 1];
                const scale = Math.pow(10, tier * 3);
                const scaled = number / scale;
                return `${scaled.toFixed(2)}${suffix}`;
            }
            return Math.floor(number).toLocaleString();
        }
        function formatPerSecond(number) {
            if (number >= 1000000) {
                const tier = Math.floor(Math.log10(number) / 3);
                const suffix = suffixes[tier - 1];
                const scale = Math.pow(10, tier * 3);
                const scaled = number / scale;
                return `${scaled.toFixed(2)}${suffix}`;
            } else if (number >= 1000) {
                return Math.floor(number).toLocaleString();
            } else {
                return number.toFixed(1);
            }
        }
        function formatPerClick(number) {
            if (number >= 1000000) {
                const tier = Math.floor(Math.log10(number) / 3);
                const suffix = suffixes[tier - 1];
                const scale = Math.pow(10, tier * 3);
                const scaled = number / scale;
                return `${scaled.toFixed(2)}${suffix}`;
            } else if (number >= 1000) {
                return Math.floor(number).toLocaleString();
            } else {
                return (number).toFixed(1);
            }
        }

        function updateDisplay() {
            cookieCountElement.textContent = `🍪${formatNumber(Math.floor(cookieCount))} cookies`;
            perSecondElement.textContent = `${formatPerSecond(cookiesPerSecond)}🍪 per second`;
            document.getElementById('cursor-label').innerHTML = `<strong>Autotap: ${ownedCursors}</strong><br><span style="font-weight: normal;">+0.1/s</span>`;
            document.getElementById('grandma-label').innerHTML = `<strong>Pickaxe: ${ownedGrandmas}</strong><br><span style="font-weight: normal;">+1/s</span>`;
            document.getElementById('farm-label').innerHTML = `<strong>Farm: ${ownedFarms}</strong><br><span style="font-weight: normal;">+8/s</span>`;
            document.getElementById('mine-label').innerHTML = `<strong>Mine: ${ownedMines}</strong><br><span style="font-weight: normal;">+47/s</span>`;
            document.getElementById('factory-label').innerHTML = `<strong>Factory: ${ownedFactories}</strong><br><span style="font-weight: normal;">+260/s</span>`;
            document.getElementById('bank-label').innerHTML = `<strong>Bank: ${ownedBanks}</strong><br><span style="font-weight: normal;">+1,400/s</span>`;
            document.getElementById('temple-label').innerHTML = `<strong>Temple: ${ownedTemples}</strong><br><span style="font-weight: normal;">+7,800/s</span>`;
            document.getElementById('wizard-label').innerHTML = `<strong>Wizard Tower: ${ownedWizards}</strong><br><span style="font-weight: normal;">+39,000/s</span>`;
            upgradeButtonElement.textContent = `🍪 ${formatNumber(Math.floor(upgradeCost))}`;
            grandmaButtonElement.textContent = `🍪 ${formatNumber(Math.floor(grandmaCost))}`;
            farmButtonElement.textContent = `🍪 ${formatNumber(Math.floor(farmCost))}`;
            mineButtonElement.textContent = `🍪 ${formatNumber(Math.floor(mineCost))}`;
            factoryButtonElement.textContent = `🍪 ${formatNumber(Math.floor(factoryCost))}`;
            bankButtonElement.textContent = `🍪 ${formatNumber(Math.floor(bankCost))}`;
            templeButtonElement.textContent = `🍪 ${formatNumber(Math.floor(templeCost))}`;
            wizardButtonElement.textContent = `🍪 ${formatNumber(Math.floor(wizardCost))}`;
            totalCookiesRow.innerHTML = `🍪${formatNumber(Math.floor(totalCookies))}`;
        }

        function createClickerClone(clicks, x, y) {
            const clone = document.createElement('div');
            clone.className = 'clicker-clone';
            clone.textContent = `+${formatPerClick(cookiesPerClick)}`;
            clone.style.top = `${y}px`;
            clone.style.left = `${x}px`;
            document.body.appendChild(clone);

            requestAnimationFrame(() => {
                clone.style.transform = 'translateY(-20px)';
                clone.style.opacity = '0';
            });

            setTimeout(() => {
                document.body.removeChild(clone);
            }, 300);
        }

        function createGoldenCookie(x, y) {
            const goldenCookie = document.createElement('img');
            goldenCookie.src = 'https://shorturl.at/MhDtw';
            goldenCookie.className = 'golden-cookie';
            goldenCookie.style.top = `${y}px`;
            goldenCookie.style.left = `${x}px`;

            goldenCookie.addEventListener('click', () => {
                const bonus = 200 + (cookiesPerSecond / 10);
                cookieCount += bonus;
                totalCookies += bonus;
                updateDisplay();
                document.body.removeChild(goldenCookie);
            });

            document.body.appendChild(goldenCookie);

            setTimeout(() => {
                if (document.body.contains(goldenCookie)) {
                    document.body.removeChild(goldenCookie);
                }
            }, 5000);
        }

        function startInterval() {
            if (intervalId) clearInterval(intervalId);

            intervalId = setInterval(() => {
                cookieCount += cookiesPerSecond / 10;
                totalCookies += cookiesPerSecond / 10;
                updateDisplay();
                checkUpgrades();
                if (maxUpgradeReached) {
                    updateCookiesPerClick();
                }
            }, 1000 / 10);
        }

        function checkUpgrades() {
            if (cookieCount >= 100) {
                document.getElementById('grandma-upgrade').style.display = 'flex';
            }
            if (cookieCount >= 1100) {
                document.getElementById('farm-upgrade').style.display = 'flex';
            }
            if (cookieCount >= 12000) {
                document.getElementById('mine-upgrade').style.display = 'flex';
            }
            if (cookieCount >= 130000) {
                document.getElementById('factory-upgrade').style.display = 'flex';
            }
            if (cookieCount >= 1400000) {
                document.getElementById('bank-upgrade').style.display = 'flex';
            }
            if (cookieCount >= 20000000) {
                document.getElementById('temple-upgrade').style.display = 'flex';
            }
            if (cookieCount >= 330000000) {
                document.getElementById('wizard-upgrade').style.display = 'flex';
            }
        }

        function saveProgress(username) {
            const progress = {
                cookieCount,
                cookiesPerClick,
                cookiesPerSecond,
                upgradeCost,
                grandmaCost,
                farmCost,
                mineCost,
                factoryCost,
                bankCost,
                templeCost,
                wizardCost,
                ownedCursors,
                ownedGrandmas,
                ownedFarms,
                ownedMines,
                ownedFactories,
                ownedBanks,
                ownedTemples,
                ownedWizards,
                maxUpgradeReached,
                totalCookies
            };
            localStorage.setItem(`cookieClicks_${username}`, JSON.stringify(progress));
        }

        function loadProgress(username) {
            const savedProgress = localStorage.getItem(`cookieClicks_${username}`);
            if (savedProgress) {
                const progress = JSON.parse(savedProgress);
                cookieCount = progress.cookieCount || 0;
                cookiesPerClick = progress.cookiesPerClick || 1;
                cookiesPerSecond = progress.cookiesPerSecond || 0;
                upgradeCost = progress.upgradeCost || 15;
                grandmaCost = progress.grandmaCost || 100;
                farmCost = progress.farmCost || 1100;
                mineCost = progress.mineCost || 12000;
                factoryCost = progress.factoryCost || 130000;
                bankCost = progress.bankCost || 1400000;
                templeCost = progress.templeCost || 20000000;
                wizardCost = progress.wizardCost || 330000000;
                ownedCursors = progress.ownedCursors || 0;
                ownedGrandmas = progress.ownedGrandmas || 0;
                ownedFarms = progress.ownedFarms || 0;
                ownedMines = progress.ownedMines || 0;
                ownedFactories = progress.ownedFactories || 0;
                ownedBanks = progress.ownedBanks || 0;
                ownedTemples = progress.ownedTemples || 0;
                ownedWizards = progress.ownedWizards || 0;
                maxUpgradeReached = progress.maxUpgradeReached || false;
                totalCookies = progress.totalCookies || cookieCount;
                updateDisplay();
                startInterval();
            }
        }

        function updateCookiesPerClick() {
            cookiesPerClick = 8 + Math.exp(Math.log10(cookiesPerSecond / 3));
        }

        cookieElement.addEventListener('click', (event) => {
            const now = Date.now();
            if (now - lastClickTime >= 10) {
                lastClickTime = now;
                cookieCount += cookiesPerClick;
                totalCookies += cookiesPerClick;
                createClickerClone(cookiesPerClick, event.clientX, event.clientY);
                updateDisplay();
                clickSoundElement.play();
            }
        });

        upgradeButtonElement.addEventListener('click', () => {
            if (cookieCount >= upgradeCost) {
                cookieCount -= upgradeCost;
                cookiesPerSecond += cursorCps;
                upgradeCost = Math.round(upgradeCost * 1.15);
                ownedCursors++;
                updateDisplay();
                startInterval();
                upgradeSoundElement.play();
            }
        });

        grandmaButtonElement.addEventListener('click', () => {
            if (cookieCount >= grandmaCost) {
                cookieCount -= grandmaCost;
                cookiesPerSecond += grandmaCps;
                grandmaCost = Math.round(grandmaCost * 1.15);
                ownedGrandmas++;
                updateDisplay();
                startInterval();
                upgradeSoundElement.play();
            }
        });

        farmButtonElement.addEventListener('click', () => {
            if (cookieCount >= farmCost) {
                cookieCount -= farmCost;
                cookiesPerSecond += farmCps;
                farmCost = Math.round(farmCost * 1.15);
                ownedFarms++;
                updateDisplay();
                startInterval();
                upgradeSoundElement.play();
            }
        });

        mineButtonElement.addEventListener('click', () => {
            if (cookieCount >= mineCost) {
                cookieCount -= mineCost;
                cookiesPerSecond += mineCps;
                mineCost = Math.round(mineCost * 1.15);
                ownedMines++;
                updateDisplay();
                startInterval();
                upgradeSoundElement.play();
            }
        });

        factoryButtonElement.addEventListener('click', () => {
            if (cookieCount >= factoryCost) {
                cookieCount -= factoryCost;
                cookiesPerSecond += factoryCps;
                factoryCost = Math.round(factoryCost * 1.15);
                ownedFactories++;
                updateDisplay();
                startInterval();
                upgradeSoundElement.play();
            }
        });

        bankButtonElement.addEventListener('click', () => {
            if (cookieCount >= bankCost) {
                cookieCount -= bankCost;
                cookiesPerSecond += bankCps;
                bankCost = Math.round(bankCost * 1.15);
                ownedBanks++;
                updateDisplay();
                startInterval();
                upgradeSoundElement.play();
            }
        });

        templeButtonElement.addEventListener('click', () => {
            if (cookieCount >= templeCost) {
                cookieCount -= templeCost;
                cookiesPerSecond += templeCps;
                templeCost = Math.round(templeCost * 1.15);
                ownedTemples++;
                updateDisplay();
                startInterval();
                upgradeSoundElement.play();
            }
        });

        wizardButtonElement.addEventListener('click', () => {
            if (cookieCount >= wizardCost) {
                cookieCount -= wizardCost;
                cookiesPerSecond += wizardCps;
                wizardCost = Math.round(wizardCost * 1.15);
                ownedWizards++;
                updateDisplay();
                startInterval();
                upgradeSoundElement.play();
            }
        });

        function initializeGame(username) {
            userInfoElement.style.display = 'flex';
            usernameDisplayElement.textContent = username;
            loadProgress(username);
        }

        // Hide loading screen and show username input after 2 seconds
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            usernameContainer.style.display = 'block';
        }, 2000);

        // Listen for username input and show the game container when entered
        const usernameInput = document.querySelector('.username-container input');
        usernameInput.addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                let username = usernameInput.value.trim();
                if (!username || username.match(/^\s*$/)) {
                    username = `User${Math.floor(Math.random() * 1000000)}`;
                }
                username = username.replace(/[^a-zA-Z0-9_.]/g, '');
                if (username) {
                    usernameContainer.style.display = 'none';
                    container.style.display = 'block';
                    initializeGame(username);
                }
            }
        });

        // Listen for continue button click and show the game container
        continueButton.addEventListener('click', () => {
            let username = usernameInput.value.trim();
            if (!username || username.match(/^\s*$/)) {
                username = `User${Math.floor(Math.random() * 1000000)}`;
            }
            username = username.replace(/[^a-zA-Z0-9_.]/g, '');
            if (username) {
                usernameContainer.style.display = 'none';
                container.style.display = 'block';
                initializeGame(username);
            }
        });

        // Save progress every 5 seconds
        setInterval(() => {
            const username = usernameInput.value.trim();
            if (username) {
                saveProgress(username);
            }
        }, 5000);

        // Handle segmented control button clicks
        buildingsButton.addEventListener('click', () => {
            buildingsButton.classList.add('selected');
            statsButton.classList.remove('selected');
            upgradeContainer.style.display = 'flex';
            statsContainer.style.display = 'none';
        });

        statsButton.addEventListener('click', () => {
            statsButton.classList.add('selected');
            buildingsButton.classList.remove('selected');
            upgradeContainer.style.display = 'none';
            statsContainer.style.display = 'flex';
        });

        startInterval();

        // Update the website name every 1 second
        setInterval(() => {
            document.title = `🍪${formatNumber(Math.floor(cookieCount))} - Cookie Tappers`;
        }, 1000);

    </script>
</body>
</html>
